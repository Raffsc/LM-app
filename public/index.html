<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>☕ PausApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a0f07;
      --bg-deep:  #120a04;
      --border:   #2d2013;
      --orange:   #f97316;
      --orange-d: #ea580c;
      --text:     #f5e6d3;
      --muted:    #c4a882;
      --dim:      #6b5a4a;
      --green:    #22c55e;
      --red:      #ef4444;
    }

    html, body { height: 100%; background: var(--bg); }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: var(--orange);
      letter-spacing: 1px;
    }

    .dot-live {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.4s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .connected-badge {
      font-size: 12px;
      color: var(--dim);
      display: flex;
      align-items: center;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Bottone notifiche ── */
    .notif-btn {
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .notif-btn.granted  { border-color: var(--green);  background: rgba(34,197,94,0.12); }
    .notif-btn.denied   { border-color: var(--red);    background: rgba(239,68,68,0.12);  opacity: 0.5; cursor: not-allowed; }
    .notif-btn.default  { border-color: var(--orange); }

    /* Tooltip */
    .notif-btn::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      font-family: Georgia, serif;
    }

    .notif-btn:hover::after { opacity: 1; }

    .user-btn {
      background: var(--border);
      color: var(--text);
      border: 1px solid var(--orange);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Toast notifica in-app ── */
    .toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-12px);
      background: var(--orange);
      color: #fff;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

    .modal-box {
      background: var(--bg);
      border: 1px solid var(--orange);
      border-radius: 16px;
      padding: 24px;
      width: 260px;
    }

    .modal-title {
      color: var(--orange);
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal-option {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
      color: var(--dim);
      cursor: pointer;
      transition: color 0.15s;
    }

    .modal-option.active { color: var(--orange); font-weight: bold; }
    .modal-option:last-child { border-bottom: none; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
    }

    /* ── Idle ── */
    .idle-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 40px;
    }

    .idle-emoji { font-size: 72px; }

    .idle-title {
      font-size: 26px;
      font-weight: bold;
    }

    .idle-sub {
      font-size: 15px;
      color: var(--dim);
      margin-bottom: 16px;
    }

    .big-btn {
      background: linear-gradient(135deg, var(--orange), var(--orange-d));
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 20px 48px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(249,115,22,0.40);
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .big-btn:active { transform: scale(0.95); }

    /* ── Active break ── */
    .active-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert-banner {
      background: var(--orange);
      border-radius: 12px;
      padding: 14px 24px;
      width: 100%;
      text-align: center;
    }

    .alert-text { font-size: 20px; font-weight: bold; color: #fff; }

    .caller-info { font-size: 15px; color: var(--muted); }
    .caller-name { font-weight: bold; color: var(--orange); }

    /* ── Timer SVG ── */
    .timer-wrapper {
      position: relative;
      width: 160px; height: 160px;
    }

    .timer-svg { position: absolute; top: 0; left: 0; }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: var(--orange);
      font-family: 'Courier New', monospace;
    }

    .timer-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 8;
    }

    .timer-progress {
      fill: none;
      stroke: var(--orange);
      stroke-width: 8;
      stroke-linecap: round;
      transform-origin: center;
      transform: rotate(-90deg);
      transition: stroke-dashoffset 1s linear;
    }

    /* ── Joiners ── */
    .joiners-box { width: 100%; }

    .joiners-title {
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 10px;
      text-align: center;
    }

    .joiners-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.3s, color 0.3s;
    }

    .chip.in    { background: var(--orange); color: #fff; }
    .chip.out   { background: var(--border); color: var(--dim); }

    /* ── Actions ── */
    .actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .join-btn {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(249,115,22,0.3);
      transition: transform 0.1s;
    }

    .join-btn:active { transform: scale(0.97); }

    .end-btn {
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── History ── */
    .history-box {
      border-top: 1px solid var(--border);
      padding: 20px 0 0;
      margin-top: 32px;
    }

    .history-title { font-size: 13px; color: var(--dim); margin-bottom: 10px; }

    .history-item {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .history-user { font-weight: bold; color: var(--orange); min-width: 70px; }
    .history-time { color: var(--muted); }
    .history-joiners { color: var(--dim); font-size: 12px; }

    /* ── Connecting overlay ── */
    .connecting {
      position: fixed; inset: 0;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
    }

    .connecting-emoji { font-size: 48px; animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .connecting-text { color: var(--dim); font-size: 16px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TEAM = ["Alexxx", "Enzos", "RaffSc"];
const CIRCUMFERENCE = 2 * Math.PI * 70;
const BREAK_DURATION = 15 * 60;

/* ─────────────────────────────────────────────────────────────
   Hook: gestione notifiche browser
   Ritorna: { permission, requestPermission, notify }
───────────────────────────────────────────────────────────── */
function useNotifications() {
  // "default" = non ancora chiesto, "granted" = ok, "denied" = bloccato
  const [permission, setPermission] = useState(
    typeof Notification !== "undefined" ? Notification.permission : "unsupported"
  );

  // Chiede il permesso al sistema operativo (mostra il popup del browser)
  const requestPermission = useCallback(async () => {
    if (typeof Notification === "undefined") return;
    if (permission === "denied") return; // non si può forzare, utente deve sbloccare dalle impostazioni
    const result = await Notification.requestPermission();
    setPermission(result);
  }, [permission]);

  // Crea e mostra una notifica di sistema
  const notify = useCallback((title, body, options = {}) => {
    if (permission !== "granted") return;
    // Se il documento è in primo piano, la notifica è comunque utile su mobile
    const n = new Notification(title, {
      body,
      icon: options.icon || "https://em-content.zobj.net/source/google/387/hot-beverage_2615.png",
      badge: options.badge || "https://em-content.zobj.net/source/google/387/hot-beverage_2615.png",
      tag: options.tag || "pausapp",        // sostituisce notifiche precedenti con stesso tag
      renotify: options.renotify ?? false,
      silent: options.silent ?? false,
      ...options,
    });

    // Cliccando la notifica porta in primo piano la tab
    n.onclick = () => { window.focus(); n.close(); };

    // Auto-chiude dopo 8 secondi
    setTimeout(() => n.close(), 8000);
  }, [permission]);

  return { permission, requestPermission, notify };
}

/* ─────────────────────────────────────────────────────────────
   Componente Toast (notifica in-app come fallback)
───────────────────────────────────────────────────────────── */
function Toast({ message, visible }) {
  return (
    <div className={"toast" + (visible ? " show" : "")}>
      {message}
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────
   App principale
───────────────────────────────────────────────────────────── */
function PausaApp() {
  const [connected, setConnected]     = useState(false);
  const [currentUser, setCurrentUser] = useState("Alexxx");
  const [showModal, setShowModal]     = useState(false);
  const [state, setState]             = useState({
    breakCaller: null, breakTime: null,
    secondsLeft: 0, joiners: [], message: "", history: [],
  });

  // Toast in-app (fallback visivo quando le notifiche non sono abilitate)
  const [toast, setToast] = useState({ message: "", visible: false });
  const toastTimer = useRef(null);

  const showToast = useCallback((msg) => {
    clearTimeout(toastTimer.current);
    setToast({ message: msg, visible: true });
    toastTimer.current = setTimeout(() => setToast(t => ({ ...t, visible: false })), 3500);
  }, []);

  const socketRef   = useRef(null);
  const prevState   = useRef(state);          // snapshot dello stato precedente

  const { permission, requestPermission, notify } = useNotifications();

  // ── Connessione Socket.io ──
  useEffect(() => {
    const socket = window.io();
    socketRef.current = socket;

    socket.on("connect",    () => setConnected(true));
    socket.on("disconnect", () => setConnected(false));
    socket.on("state",      (s) => setState(s));

    return () => socket.disconnect();
  }, []);

  // ── Rilevamento cambiamenti di stato → notifica ──
  useEffect(() => {
    const prev = prevState.current;
    const curr = state;

    // Caso 1: pausa INIZIATA (qualcuno ha chiamato la pausa)
    if (!prev.breakCaller && curr.breakCaller) {
      const isMe = curr.breakCaller === currentUser;
      const title = isMe ? "☕ Hai chiamato la pausa!" : `☕ ${curr.breakCaller} ha chiamato la pausa!`;
      const body  = curr.message || "È ora di un caffè!";

      notify(title, body, { tag: "break-start", renotify: true });

      // Toast in-app come fallback (o in aggiunta)
      if (!isMe) showToast(`${curr.breakCaller} ha chiamato la pausa! ☕`);
    }

    // Caso 2: pausa TERMINATA
    if (prev.breakCaller && !curr.breakCaller) {
      notify("💻 Pausa terminata", "È ora di tornare al lavoro!", {
        tag: "break-end",
        renotify: true,
        silent: false,
      });
      showToast("💻 Pausa terminata — si torna al lavoro!");
    }

    // Caso 3: qualcuno si è UNITO alla pausa
    if (
      curr.breakCaller &&
      curr.joiners.length > prev.joiners.length
    ) {
      const newJoiner = curr.joiners.find(j => !prev.joiners.includes(j));
      if (newJoiner && newJoiner !== currentUser) {
        notify(`☕ ${newJoiner} si è unito`, "Altro caffè in arrivo!", {
          tag: `join-${newJoiner}`,
          silent: true,     // silenziosa per non rompere le scatole
        });
      }
    }

    prevState.current = curr;
  }, [state, currentUser, notify, showToast]);

  const emit = (event, data) => socketRef.current?.emit(event, data);

  const callBreak = () => emit("callBreak", { user: currentUser });
  const joinBreak = () => emit("joinBreak", { user: currentUser });
  const endBreak  = () => emit("endBreak");

  const formatTime = (s) => {
    const m   = Math.floor(s / 60).toString().padStart(2, "0");
    const sec = (s % 60).toString().padStart(2, "0");
    return `${m}:${sec}`;
  };

  const progress = state.secondsLeft > 0
    ? ((BREAK_DURATION - state.secondsLeft) / BREAK_DURATION) * 100
    : 0;
  const dashOffset = CIRCUMFERENCE * (1 - progress / 100);

  // Icona e tooltip del bottone notifiche
  const notifIcon = permission === "granted" ? "🔔"
                  : permission === "denied"  ? "🔕"
                  : "🔔";
  const notifTip  = permission === "granted" ? "Notifiche attive"
                  : permission === "denied"  ? "Bloccate — sblocca dalle impostazioni browser"
                  : "Attiva notifiche";

  if (!connected) {
    return (
      <div className="connecting">
        <span className="connecting-emoji">☕</span>
        <span className="connecting-text">Connessione in corso…</span>
      </div>
    );
  }

  return (
    <>
      {/* Toast in-app */}
      <Toast message={toast.message} visible={toast.visible} />

      {/* Header */}
      <div className="header">
        <div>
          <div className="logo">☕ PausApp</div>
          <div className="connected-badge">
            <span className="dot-live" />
            live
          </div>
        </div>
        <div className="header-right">
          {/* Bottone notifiche */}
          <button
            className={"notif-btn " + permission}
            data-tip={notifTip}
            onClick={requestPermission}
            aria-label={notifTip}
          >
            {notifIcon}
          </button>

          <button className="user-btn" onClick={() => setShowModal(true)}>
            {currentUser} ▾
          </button>
        </div>
      </div>

      {/* User modal */}
      {showModal && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Chi sei?</div>
            {TEAM.map(name => (
              <div
                key={name}
                className={"modal-option" + (currentUser === name ? " active" : "")}
                onClick={() => { setCurrentUser(name); setShowModal(false); }}
              >
                {currentUser === name ? "✓  " : "    "}{name}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Main */}
      <div className="main">
        {!state.breakCaller ? (
          <div className="idle-box">
            <span className="idle-emoji">🏢</span>
            <span className="idle-title">Tutti al lavoro</span>
            <span className="idle-sub">Sei pronto per una pausa?</span>
            <button className="big-btn" onClick={callBreak}>
              CHIAMA LA PAUSA
            </button>

            {/* Prompt notifiche se non ancora chiesto */}
            {permission === "default" && (
              <button
                className="end-btn"
                style={{ marginTop: 8, fontSize: 13 }}
                onClick={requestPermission}
              >
                🔔 Attiva notifiche per riceverle in background
              </button>
            )}
          </div>
        ) : (
          <div className="active-box">
            {/* Banner */}
            <div className="alert-banner">
              <span className="alert-text">{state.message}</span>
            </div>

            {/* Chi ha chiamato */}
            <div className="caller-info">
              <span className="caller-name">{state.breakCaller}</span>
              {" "}ha chiamato la pausa
            </div>

            {/* Timer SVG */}
            <div className="timer-wrapper">
              <svg className="timer-svg" width="160" height="160" viewBox="0 0 160 160">
                <circle className="timer-track" cx="80" cy="80" r="70" />
                <circle
                  className="timer-progress"
                  cx="80" cy="80" r="70"
                  strokeDasharray={CIRCUMFERENCE}
                  strokeDashoffset={dashOffset}
                />
              </svg>
              <div className="timer-text">{formatTime(state.secondsLeft)}</div>
            </div>

            {/* Joiners */}
            <div className="joiners-box">
              <div className="joiners-title">
                In pausa ({state.joiners.length}/{TEAM.length})
              </div>
              <div className="joiners-list">
                {TEAM.map(name => {
                  const isIn = state.joiners.includes(name);
                  return (
                    <div key={name} className={"chip " + (isIn ? "in" : "out")}>
                      {isIn ? "☕" : "💻"} {name}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Azioni */}
            <div className="actions">
              {!state.joiners.includes(currentUser) && (
                <button className="join-btn" onClick={joinBreak}>
                  Unisciti alla pausa ☕
                </button>
              )}
              <button className="end-btn" onClick={endBreak}>
                Termina pausa
              </button>
            </div>
          </div>
        )}

        {/* Storico */}
        {state.history.length > 0 && (
          <div className="history-box">
            <div className="history-title">📋 Ultime pause</div>
            {state.history.map((h, i) => (
              <div key={i} className="history-item">
                <span className="history-user">{h.caller}</span>
                <span className="history-time">
                  {new Date(h.time).toLocaleTimeString("it-IT", {
                    hour: "2-digit", minute: "2-digit"
                  })}
                </span>
                <span className="history-joiners">
                  con {h.joiners.length} {h.joiners.length === 1 ? "persona" : "persone"}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PausaApp />);
</script>
</body>
</html>
