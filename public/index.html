<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>☕ LMApp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a0f07;
      --bg-deep:  #120a04;
      --border:   #2d2013;
      --orange:   #f97316;
      --orange-d: #ea580c;
      --text:     #f5e6d3;
      --muted:    #c4a882;
      --dim:      #6b5a4a;
    }

    html, body { height: 100%; background: var(--bg); }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: var(--orange);
      letter-spacing: 1px;
    }

    .dot-live {
      display: inline-block;
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.4s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .connected-badge {
      font-size: 12px;
      color: var(--dim);
      display: flex;
      align-items: center;
    }

    .user-btn {
      background: var(--border);
      color: var(--text);
      border: 1px solid var(--orange);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

    .modal-box {
      background: var(--bg);
      border: 1px solid var(--orange);
      border-radius: 16px;
      padding: 24px;
      width: 260px;
    }

    .modal-title {
      color: var(--orange);
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 16px;
      text-align: center;
    }

    .modal-option {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
      color: var(--dim);
      cursor: pointer;
      transition: color 0.15s;
    }

    .modal-option.active { color: var(--orange); font-weight: bold; }
    .modal-option:last-child { border-bottom: none; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 24px 20px;
      overflow-y: auto;
    }

    /* ── Idle ── */
    .idle-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 40px;
    }

    .idle-emoji { font-size: 72px; }

    .idle-title {
      font-size: 26px;
      font-weight: bold;
    }

    .idle-sub {
      font-size: 15px;
      color: var(--dim);
      margin-bottom: 16px;
    }

    .big-btn {
      background: linear-gradient(135deg, var(--orange), var(--orange-d));
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 20px 48px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(249,115,22,0.40);
      font-family: inherit;
      transition: transform 0.1s, box-shadow 0.1s;
      active: transform 0.95;
    }

    .big-btn:active { transform: scale(0.95); }

    /* ── Active break ── */
    .active-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert-banner {
      background: var(--orange);
      border-radius: 12px;
      padding: 14px 24px;
      width: 100%;
      text-align: center;
    }

    .alert-text { font-size: 20px; font-weight: bold; color: #fff; }

    .caller-info { font-size: 15px; color: var(--muted); }
    .caller-name { font-weight: bold; color: var(--orange); }

    /* ── Timer SVG ── */
    .timer-wrapper {
      position: relative;
      width: 160px; height: 160px;
    }

    .timer-svg { position: absolute; top: 0; left: 0; }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: var(--orange);
      font-family: 'Courier New', monospace;
    }

    .timer-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 8;
    }

    .timer-progress {
      fill: none;
      stroke: var(--orange);
      stroke-width: 8;
      stroke-linecap: round;
      transform-origin: center;
      transform: rotate(-90deg);
      transition: stroke-dashoffset 1s linear;
    }

    /* ── Joiners ── */
    .joiners-box { width: 100%; }

    .joiners-title {
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 10px;
      text-align: center;
    }

    .joiners-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.3s, color 0.3s;
    }

    .chip.in    { background: var(--orange); color: #fff; }
    .chip.out   { background: var(--border); color: var(--dim); }

    /* ── Actions ── */
    .actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .join-btn {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(249,115,22,0.3);
      transition: transform 0.1s;
    }

    .join-btn:active { transform: scale(0.97); }

    .end-btn {
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── History ── */
    .history-box {
      border-top: 1px solid var(--border);
      padding: 20px 0 0;
      margin-top: 32px;
    }

    .history-title { font-size: 13px; color: var(--dim); margin-bottom: 10px; }

    .history-item {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .history-user { font-weight: bold; color: var(--orange); min-width: 70px; }
    .history-time { color: var(--muted); }
    .history-joiners { color: var(--dim); font-size: 12px; }

    /* ── Connecting overlay ── */
    .connecting {
      position: fixed; inset: 0;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
    }

    .connecting-emoji { font-size: 48px; animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .connecting-text { color: var(--dim); font-size: 16px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TEAM = ["Alexxx", "Enzos", "RaffSc"];
const CIRCUMFERENCE = 2 * Math.PI * 70;
const BREAK_DURATION = 15 * 60;

function PausaApp() {
  const [connected, setConnected]     = useState(false);
  const [currentUser, setCurrentUser] = useState("Alexxx");
  const [showModal, setShowModal]     = useState(false);
  const [state, setState]             = useState({
    breakCaller: null, breakTime: null,
    secondsLeft: 0, joiners: [], message: "", history: [],
  });

  const socketRef = useRef(null);

  useEffect(() => {
    const socket = window.io();
    socketRef.current = socket;

    socket.on("connect",    () => setConnected(true));
    socket.on("disconnect", () => setConnected(false));
    socket.on("state",      (s) => setState(s));

    return () => socket.disconnect();
  }, []);

  const emit = (event, data) => socketRef.current?.emit(event, data);

  const callBreak = () => emit("callBreak", { user: currentUser });
  const joinBreak = () => emit("joinBreak", { user: currentUser });
  const endBreak  = () => emit("endBreak");

  const formatTime = (s) => {
    const m   = Math.floor(s / 60).toString().padStart(2, "0");
    const sec = (s % 60).toString().padStart(2, "0");
    return `${m}:${sec}`;
  };

  const progress = state.secondsLeft > 0
    ? ((BREAK_DURATION - state.secondsLeft) / BREAK_DURATION) * 100
    : 0;
  const dashOffset = CIRCUMFERENCE * (1 - progress / 100);

  if (!connected) {
    return (
      <div className="connecting">
        <span className="connecting-emoji">☕</span>
        <span className="connecting-text">Connessione in corso…</span>
      </div>
    );
  }

  return (
    <>
      {/* Header */}
      <div className="header">
        <div>
          <div className="logo">☕ PausApp</div>
          <div className="connected-badge">
            <span className="dot-live" />
            live
          </div>
        </div>
        <button className="user-btn" onClick={() => setShowModal(true)}>
          {currentUser} ▾
        </button>
      </div>

      {/* User modal */}
      {showModal && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Chi sei?</div>
            {TEAM.map(name => (
              <div
                key={name}
                className={"modal-option" + (currentUser === name ? " active" : "")}
                onClick={() => { setCurrentUser(name); setShowModal(false); }}
              >
                {currentUser === name ? "✓  " : "    "}{name}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Main */}
      <div className="main">
        {!state.breakCaller ? (
          <div className="idle-box">
            <span className="idle-emoji">🏢</span>
            <span className="idle-title">Tutti al lavoro</span>
            <span className="idle-sub">Sei pronto per una pausa?</span>
            <button className="big-btn" onClick={callBreak}>
              CHIAMA LA PAUSA
            </button>
          </div>
        ) : (
          <div className="active-box">
            {/* Banner */}
            <div className="alert-banner">
              <span className="alert-text">{state.message}</span>
            </div>

            {/* Chi ha chiamato */}
            <div className="caller-info">
              <span className="caller-name">{state.breakCaller}</span>
              {" "}ha chiamato la pausa
            </div>

            {/* Timer SVG */}
            <div className="timer-wrapper">
              <svg className="timer-svg" width="160" height="160" viewBox="0 0 160 160">
                <circle className="timer-track" cx="80" cy="80" r="70" />
                <circle
                  className="timer-progress"
                  cx="80" cy="80" r="70"
                  strokeDasharray={CIRCUMFERENCE}
                  strokeDashoffset={dashOffset}
                />
              </svg>
              <div className="timer-text">{formatTime(state.secondsLeft)}</div>
            </div>

            {/* Joiners */}
            <div className="joiners-box">
              <div className="joiners-title">
                In pausa ({state.joiners.length}/{TEAM.length})
              </div>
              <div className="joiners-list">
                {TEAM.map(name => {
                  const isIn = state.joiners.includes(name);
                  return (
                    <div key={name} className={"chip " + (isIn ? "in" : "out")}>
                      {isIn ? "☕" : "💻"} {name}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Azioni */}
            <div className="actions">
              {!state.joiners.includes(currentUser) && (
                <button className="join-btn" onClick={joinBreak}>
                  Unisciti alla pausa ☕
                </button>
              )}
              <button className="end-btn" onClick={endBreak}>
                Termina pausa
              </button>
            </div>
          </div>
        )}

        {/* Storico */}
        {state.history.length > 0 && (
          <div className="history-box">
            <div className="history-title">📋 Ultime pause</div>
            {state.history.map((h, i) => (
              <div key={i} className="history-item">
                <span className="history-user">{h.caller}</span>
                <span className="history-time">
                  {new Date(h.time).toLocaleTimeString("it-IT", {
                    hour: "2-digit", minute: "2-digit"
                  })}
                </span>
                <span className="history-joiners">
                  con {h.joiners.length} {h.joiners.length === 1 ? "persona" : "persone"}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PausaApp />);
</script>
</body>
</html>
